app.name=灵枢IMA知识库下载器V2.2
app.version=2.2

api.url=https://ima.qq.com/cgi-bin/knowledge_share_get/get_share_info
api.timeout=30000
api.limit.default=20
api.limit.max=50
api.retry.count=3

download.dir=./downloads
download.thread=20
download.chunk.size=8192
